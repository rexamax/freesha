name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install ".[dev]"
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Lint
        run: ruff check .
      - name: Build wheel and source distribution
        run: python -m build
      - name: Installed CLI smoke test outside checkout
        working-directory: ${{ runner.temp }}
        run: |
          freesha benchmark --store freesha-ci/benchmark
          freesha joy --dry-run --store freesha-ci/joy
